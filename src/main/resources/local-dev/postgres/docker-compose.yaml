services:
  postgresql:
    image: postgres:14.20
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: msgraphuser
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:9.11
    ports:
      - 5480:80
    user: "5050"
    environment:
      - PGADMIN_DEFAULT_EMAIL=somemail@fake.com
      - PGADMIN_DEFAULT_PASSWORD=password
      - PGADMIN_LISTEN_ADDRESS=0.0.0.0
      - PGADMIN_DISABLE_POSTFIX=true
    depends_on:
      - postgresql
    configs:
      - source: server-json
        target: /pgadmin4/servers.json

configs:
  server-json:
    content: |
      {
        "Servers": {
          "1": {
            "Name": "Local Server",
            "Group": "Servers",
            "Port": 5432,
            "Username": "msgraphuser",
            "Host": "postgresql",
            "SSLMode": "prefer",
            "MaintenanceDB": "postgres"
          }
        }
      }
volumes:
  postgres_data_ms_graph_gw: