spring:
    datasource:
        driver-class-name: org.postgresql.Driver
        username: ${fint.database.username}
        url: ${fint.database.url}
        password: ${fint.database.password}
    flyway:
        locations: classpath:db/migration
        lock-retry-count: 300
    jpa:
        open-in-view: false
        properties:
            hibernate:
                transaction:
                    coordinator_class: jdbc
    jta:
        enabled: false
