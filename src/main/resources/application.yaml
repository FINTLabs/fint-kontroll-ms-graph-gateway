fint:
    application-id: fint-kontroll-ms-graph-gateway
    kontroll:
        opa:
            url: http://fint-kontroll-opa:8181/v1/data/accessmanagement
spring:
    profiles:
        include:
            - kafka
            - db
    security:
        oauth2:
            resourceserver:
                jwt:
                    issuer-uri: https://idp.felleskomponent.no/nidp/oauth/nam
server:
    port: 8080

logging:
    pattern:
        console: "%d{dd.MM.yyyy HH:mm:ss.SSSXXX} %highlight(%-9level) %logger{0} - %msg%n"
    level:
        com.azure: WARN
        com.microsoft: WARN
        org.apache: WARN
        org.springframework.boot.autoconfigure.flyway: INFO
        org.flywaydb: INFO
        no.novari: DEBUG

novari:
    application-id: fint-kontroll-ms-graph-gateway
    org-id: fintlabs.no
    kafka:
        topic:
            org-id: fintlabs-no
            domain-context: kontroll
        application-id: fintlabs.no
        default-replicas: 1
    scheduler:
        user:
            delta:
                fixed-delay-ms: 1200000
                initial-delay-ms: 10000
            full-import:
                cron: 0 15 12 * * *
ms-graph:
    membership:
        device:
            consumer-concurrency: 12
            consumer-max-poll-records: 500
            graph-max-concurrent-calls: 3
            graph-batch-size: 20
            result-topic-partitions: 1
            directory-objects-base-url: https://graph.microsoft.com/v1.0/directoryObjects/

management:
    endpoints:
        web:
            exposure:
                include: "prometheus,health,info"
