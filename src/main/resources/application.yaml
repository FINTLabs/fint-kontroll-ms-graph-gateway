fint:
    application-id: fint-kontroll-ms-graph-gateway
spring:
    profiles:
        include:
            - kafka
            - db
    security:
        oauth2:
            resourceserver:
                jwt:
                    issuer-uri: https://idp.felleskomponent.no/nidp/oauth/nam
server:
    port: 8080

logging:
    pattern:
        console: "%d{dd.MM.yyyy HH:mm:ss.SSSXXX} %highlight(%-9level) %logger{0} - %msg%n"
    level:
        com.azure: WARN
        com.microsoft: WARN
        org.apache: WARN
        org.springframework.boot.autoconfigure.flyway: INFO
        org.flywaydb: INFO
        no.novari: INFO

novari:
    application-id: fint-kontroll-ms-graph-gateway
    org-id: fintlabs.no
    kafka:
        topic:
            org-id: fintlabs-no
            domain-context: kontroll
        application-id: fintlabs.no
        default-replicas: 1
    scheduler:
        user:
            delta:
                fixed-delay-ms: 1200000
                initial-delay-ms: 10000
            full-import:
                cron: 0 15 12 * * *



