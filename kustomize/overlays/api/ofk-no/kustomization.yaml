apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ofk-no
resources:
  - ../../../base
commonLabels:
  app.kubernetes.io/name: fint-kontroll-ms-graph-gateway
  app.kubernetes.io/instance: fint-kontroll-ms-graph-gateway_ofk-no
  app.kubernetes.io/version: latest
  app.kubernetes.io/component: backend
  app.kubernetes.io/part-of: fint-kontroll
  fintlabs.no/team: bas
  fintlabs.no/org-id: ofk.no
patches:
  - patch: |-
      - op: replace
        path: "/spec/orgId"
        value: "ofk.no"
      - op: replace
        path: "/spec/kafka/acls/0/topic"
        value: "ofk-no.kontroll.e*"
      - op: replace
        path: "/spec/kafka/acls/1/topic"
        value: "ofk-no.kontroll.*"
      - op: add
        path: "/spec/resources"
        value: 
          limits:
            memory: "10Gi"
          requests:
            cpu: "500m"
            memory: "4Gi"
      - op: add
        path: "/spec/env/0"
        value:
          name: "JAVA_TOOL_OPTIONS"
          value: "-XX:+ExitOnOutOfMemoryError -Xmx9728m"
    target:
      kind: Application
      name: fint-kontroll-ms-graph-gateway
  - patch: |-
      - op: replace
        path: "/spec/itemPath"
        value: "vaults/aks-api-vault/items/kontroll-ofk-ms-graph-gateway"
    target:
      kind: OnePasswordItem
      name: fint-kontroll-ms-graph-gateway