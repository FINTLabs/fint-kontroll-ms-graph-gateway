apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: fridiks-no
resources:
  - ../../../base
labels:
    - includeSelectors: true
      pairs:
          app.kubernetes.io/instance: fint-kontroll-ms-graph-gateway_fridiks-no
          fintlabs.no/org-id: fridiks.no
patches:
  - patch: |-
      - op: replace
        path: "/spec/orgId"
        value: "fridiks.no"
      - op: replace
        path: "/spec/kafka/acls/0/topic"
        value: "fridiks-no.kontroll.entity.resource-group*"
      - op: replace
        path: "/spec/kafka/acls/1/topic"
        value: "fridiks-no.kontroll.event.resource-group*"
      - op: replace
        path: "/spec/kafka/acls/2/topic"
        value: "fridiks-no.kontroll.entity.graph-*"
      - op: replace
        path: "/spec/kafka/acls/3/topic"
        value: "fridiks-no.kontroll.event.graph-*"
      - op: replace
        path: "/spec/env/0"
        value:
            name: "JAVA_TOOL_OPTIONS"
            value: "-XX:+ExitOnOutOfMemoryError -Xmx1792m"
      - op: add
        path: "/spec/resources"
        value: 
          limits:
            memory: "2Gi"
          requests:
            cpu: "500m"
            memory: "1Gi"

    target:
      kind: Application
      name: fint-kontroll-ms-graph-gateway
  - patch: |-
      - op: replace
        path: "/spec/itemPath"
        value: "vaults/aks-api-vault/items/kontroll-frid-iks-ms-graph-gateway"
    target:
      kind: OnePasswordItem
      name: fint-kontroll-ms-graph-gateway
