apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: nfk-no
resources:
  - ../../../base
commonLabels:
  app.kubernetes.io/name: fint-kontroll-ms-graph-gateway
  app.kubernetes.io/instance: fint-kontroll-ms-graph-gateway_nfk-no
  app.kubernetes.io/version: latest
  app.kubernetes.io/component: backend
  app.kubernetes.io/part-of: fint-kontroll
  fintlabs.no/team: bas
  fintlabs.no/org-id: nfk.no
patches:
  - patch: |-
      - op: replace
        path: "/spec/orgId"
        value: "nfk.no"
      - op: replace
        path: "/spec/kafka/acls/0/topic"
        value: "nfk-no.kontroll.*"
      - op: replace
        path: "/spec/kafka/acls/1/topic"
        value: "nfk-no.kontroll.*"
      - op: add
        path: "/spec/resources"
        value: 
          limits:
            memory: "6Gi"
          requests:
            cpu: "500m"
            memory: "4Gi"
      - op: add
        path: "/spec/env/0"
        value:
          name: "JAVA_TOOL_OPTIONS"
          value: "-XX:+ExitOnOutOfMemoryError -Xmx5824m"
    target:
      kind: Application
      name: fint-kontroll-ms-graph-gateway
  - patch: |-
      - op: replace
        path: "/spec/itemPath"
        value: "vaults/aks-api-vault/items/kontroll-nfk-ms-graph-gateway"
    target:
      kind: OnePasswordItem
      name: fint-kontroll-ms-graph-gateway